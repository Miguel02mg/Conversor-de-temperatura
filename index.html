<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Temperatura</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4 formulario">
            <h2 class="text-center mb-4">Conversor de Temperatura</h2>
            <div class="mb-3">
                <label for="celsius" class="form-label">
                    Temperatura en °C
                </label>
                <input
                    type="text"
                    id="celsius"
                    class="form-control"
                    placeholder="Ejemplo: 45">
            </div>
            <button id="btnConvertir" class="btn btn-primary">
                Convertir
            </button>
            <div id="resultado" class="mt-4"></div>
        </div>
    </div>
    <script src="conversor.js"></script>
</body>
</html>
